<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get your meeting transcribed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #B7BDF7;
      --dark:         #576A8F;
      --dark-hover:   #47597c;
      --light:        #FFF8DE;
      --accent:       #FF7444;
      --accent-hover: #e86030;
      --text-dark:    #fff;
      --text-light:   #2d3142;
      --border:       rgba(87,106,143,0.25);
      --shadow:       0 4px 20px rgba(87,106,143,0.18);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--dark);
      color: var(--text-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    nav h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab {
      padding: 6px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .nav-tab:hover  { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-tab.active { background: var(--light); color: var(--dark); }

    /* ── Main layout ── */
    main { flex: 1; padding: 36px 24px; }
    .view { display: none; }
    .view.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--light);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--dark);   color: var(--text-dark); }
    .btn-primary:hover:not(:disabled) { background: var(--dark-hover); }
    .btn-accent    { background: var(--accent);  color: #fff; }
    .btn-accent:hover:not(:disabled)  { background: var(--accent-hover); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--dark);
    }
    .btn-outline:hover { border-color: var(--dark); background: rgba(87,106,143,0.06); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ═══════════════════════════════════════════
       TRANSCRIBE VIEW
    ═══════════════════════════════════════════ */
    #view-transcribe { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(255,116,68,0.05);
    }
    #drop-zone svg { display: block; margin: 0 auto 14px; opacity: 0.45; }
    #drop-zone p   { font-size: 15px; color: #6e6e73; }
    #drop-zone strong { color: var(--dark); }
    #file-input { display: none; }

    #file-name {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--dark);
      min-height: 18px;
    }

    /* Model selector */
    .model-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .model-row label { font-size: 13px; color: #6e6e73; }
    .model-pills { display: flex; gap: 6px; }
    .model-pill {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--dark);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .model-pill.selected {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    /* Action row */
    .action-row { display: flex; gap: 10px; margin-top: 4px; }

    /* Progress */
    #progress-section { display: none; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    #progress-label { font-size: 14px; color: var(--dark); font-weight: 500; }
    #progress-pct   { font-size: 14px; color: var(--accent); font-weight: 600; }
    .progress-track {
      height: 8px;
      background: rgba(87,106,143,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--dark), var(--accent));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Result */
    #result-section { display: none; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .result-header span { font-size: 15px; font-weight: 600; color: var(--dark); }
    .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    #transcript-box {
      width: 100%;
      height: 340px;
      padding: 16px;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 13px;
      line-height: 1.75;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      background: rgba(255,248,222,0.5);
      color: var(--text-light);
      outline: none;
    }
    #transcript-box:focus { border-color: var(--dark); }

    /* Save to library inline panel */
    #save-panel {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: rgba(87,106,143,0.06);
    }
    #save-panel p { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 10px; }
    .save-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #project-select {
      flex: 1;
      min-width: 160px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--light);
      color: var(--text-light);
      font-size: 13px;
      outline: none;
    }
    #project-select:focus { border-color: var(--dark); }
    #new-project-input {
      flex: 1;
      min-width: 160px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--light);
      font-size: 13px;
      outline: none;
      display: none;
    }
    #new-project-input:focus { border-color: var(--dark); }
    #save-success {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: var(--dark);
      font-weight: 500;
    }

    /* Error */
    .error-msg {
      display: none;
      padding: 12px 16px;
      background: #fff2f2;
      border: 1px solid #ffb3b3;
      border-radius: 8px;
      font-size: 13px;
      color: #cc0000;
    }

    /* ═══════════════════════════════════════════
       LIBRARY VIEW
    ═══════════════════════════════════════════ */
    #view-library {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* Projects sidebar */
    .lib-sidebar { display: flex; flex-direction: column; gap: 8px; }

    .lib-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dark);
      opacity: 0.6;
      padding: 0 4px;
      margin-bottom: 2px;
    }

    .project-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
      background: var(--light);
      box-shadow: 0 1px 4px rgba(87,106,143,0.1);
    }
    .project-item:hover { background: rgba(255,248,222,0.85); }
    .project-item.selected { background: var(--dark); color: #fff; box-shadow: var(--shadow); }
    .project-item.selected .proj-icon,
    .project-item.selected .proj-name { color: #fff; }
    .proj-icon { font-size: 14px; flex-shrink: 0; }
    .proj-name { flex: 1; font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj-name-input {
      flex: 1;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      color: inherit;
      min-width: 0;
    }
    .proj-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .icon-btn {
      width: 26px; height: 26px;
      border: none; border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      opacity: 0.5;
      transition: opacity 0.12s, background 0.12s;
    }
    .icon-btn:hover { opacity: 1; background: rgba(0,0,0,0.08); }
    .icon-btn.danger:hover { background: rgba(255,116,68,0.15); color: var(--accent); opacity: 1; }
    .project-item.selected .icon-btn { color: #fff; }
    .project-item.selected .icon-btn:hover { background: rgba(255,255,255,0.15); }

    /* Transcripts panel */
    .lib-main { display: flex; flex-direction: column; gap: 12px; }

    .lib-main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .lib-main-header h2 { font-size: 17px; font-weight: 600; color: var(--dark); }

    .transcript-card {
      background: var(--light);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(87,106,143,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tc-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tc-filename { font-size: 14px; font-weight: 600; color: var(--dark); }
    .tc-date { font-size: 12px; color: #888; }
    .tc-preview {
      font-size: 12px;
      color: #6e6e73;
      font-family: "SF Mono", "Menlo", monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tc-actions { display: flex; gap: 6px; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: rgba(87,106,143,0.5);
      font-size: 15px;
    }
    .empty-state svg { margin: 0 auto 12px; display: block; opacity: 0.3; }
  </style>
</head>
<body>

<nav>
  <h1>Get your meeting transcribed</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="transcribe">Transcribe</button>
    <button class="nav-tab"        data-view="library">Library</button>
  </div>
</nav>

<main>

  <!-- ── TRANSCRIBE VIEW ── -->
  <div id="view-transcribe" class="view active">

    <div class="card">
      <div id="drop-zone">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#576A8F" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p><strong>Click to choose</strong> or drag an MP4 file here</p>
        <input type="file" id="file-input" accept=".mp4,video/mp4" />
      </div>
      <p id="file-name"></p>

      <div class="model-row">
        <label>Model:</label>
        <div class="model-pills">
          <button class="model-pill selected" data-model="medium">Medium — faster</button>
          <button class="model-pill"          data-model="large-v2">Large-v2 — best accuracy</button>
        </div>
      </div>

      <div class="action-row" style="margin-top:20px">
        <button id="transcribe-btn" class="btn btn-primary" disabled>Transcribe</button>
        <button id="cancel-btn"     class="btn btn-accent"  style="display:none">Cancel</button>
      </div>
    </div>

    <div id="progress-section" class="card">
      <div class="progress-header">
        <span id="progress-label">Starting…</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div id="error-card" class="card" style="display:none">
      <div class="error-msg" id="error-msg" style="display:block"></div>
    </div>

    <div id="result-section" class="card">
      <div class="result-header">
        <span>Transcript</span>
        <div class="result-actions">
          <button id="copy-btn"     class="btn btn-outline btn-sm">Copy all</button>
          <button id="download-btn" class="btn btn-outline btn-sm">Download .txt</button>
          <button id="save-lib-btn" class="btn btn-primary  btn-sm">Save to Library</button>
        </div>
      </div>
      <textarea id="transcript-box" readonly></textarea>

      <div id="save-panel">
        <p>Save to Library</p>
        <div class="save-row">
          <select id="project-select">
            <option value="">No project (Uncategorized)</option>
          </select>
          <input id="new-project-input" type="text" placeholder="New project name…" />
          <button id="confirm-save-btn" class="btn btn-primary btn-sm">Save</button>
          <button id="cancel-save-btn"  class="btn btn-outline btn-sm">Cancel</button>
        </div>
        <p id="save-success">✓ Saved to Library!</p>
      </div>
    </div>

  </div><!-- /view-transcribe -->

  <!-- ── LIBRARY VIEW ── -->
  <div id="view-library" class="view">

    <div class="lib-sidebar card">
      <p class="lib-section-label">Projects</p>
      <div id="project-list"><!-- filled by JS --></div>
      <button id="new-project-btn" class="btn btn-primary btn-sm" style="margin-top:12px;width:100%">+ New project</button>
    </div>

    <div class="lib-main card">
      <div class="lib-main-header">
        <h2 id="lib-panel-title">Select a project</h2>
      </div>
      <div id="transcript-list"><!-- filled by JS --></div>
    </div>

  </div><!-- /view-library -->

</main>

<script>
// ═══════════════════════════════════════════════════════
// NAV / VIEW SWITCHING
// ═══════════════════════════════════════════════════════
const views = { transcribe: document.getElementById("view-transcribe"),
                library:    document.getElementById("view-library") };
const tabs  = document.querySelectorAll(".nav-tab");

tabs.forEach(tab => tab.addEventListener("click", () => {
  tabs.forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  const v = tab.dataset.view;
  Object.values(views).forEach(el => el.classList.remove("active"));
  views[v].classList.add("active");
  if (v === "library") loadLibrary();
}));

// ═══════════════════════════════════════════════════════
// TRANSCRIBE VIEW
// ═══════════════════════════════════════════════════════
const dropZone      = document.getElementById("drop-zone");
const fileInput     = document.getElementById("file-input");
const fileNameEl    = document.getElementById("file-name");
const transcribeBtn = document.getElementById("transcribe-btn");
const cancelBtn     = document.getElementById("cancel-btn");
const progressSec   = document.getElementById("progress-section");
const progressLabel = document.getElementById("progress-label");
const progressPct   = document.getElementById("progress-pct");
const progressFill  = document.getElementById("progress-fill");
const errorCard     = document.getElementById("error-card");
const errorMsg      = document.getElementById("error-msg");
const resultSec     = document.getElementById("result-section");
const transcriptBox = document.getElementById("transcript-box");
const copyBtn       = document.getElementById("copy-btn");
const downloadBtn   = document.getElementById("download-btn");
const saveLibBtn    = document.getElementById("save-lib-btn");

let selectedFile = null;
let selectedModel = "medium";
let currentJobId  = null;
let pollInterval  = null;

// Model pills
document.querySelectorAll(".model-pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".model-pill").forEach(p => p.classList.remove("selected"));
    pill.classList.add("selected");
    selectedModel = pill.dataset.model;
  });
});

// File pick
dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => setFile(fileInput.files[0]));
dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith(".mp4")) setFile(f);
  else showError("Please drop an MP4 file.");
});

function setFile(f) {
  if (!f) return;
  selectedFile = f;
  fileNameEl.textContent = `${f.name}  (${(f.size/1024/1024).toFixed(1)} MB)`;
  transcribeBtn.disabled = false;
  hideError();
  resultSec.style.display = "none";
}

// Transcribe
transcribeBtn.addEventListener("click", async () => {
  if (!selectedFile) return;
  transcribeBtn.disabled = true;
  cancelBtn.style.display = "inline-flex";
  hideError();
  resultSec.style.display = "none";
  progressSec.style.display = "block";
  setProgress(0, "Uploading…");

  const fd = new FormData();
  fd.append("file", selectedFile);
  fd.append("model", selectedModel);

  let resp;
  try {
    resp = await fetch("/transcribe", { method: "POST", body: fd });
  } catch (err) {
    showError("Could not reach the server — make sure the app is running in Terminal. (" + err.message + ")");
    resetUI();
    return;
  }

  const data = await resp.json();
  if (!resp.ok) { showError(data.error || "Upload failed."); resetUI(); return; }

  currentJobId = data.job_id;
  pollInterval = setInterval(poll, 1500);
});

// Cancel
cancelBtn.addEventListener("click", async () => {
  if (!currentJobId) return;
  clearInterval(pollInterval);
  await fetch(`/cancel/${currentJobId}`, { method: "POST" });
  setProgress(0, "Cancelled");
  progressSec.style.display = "none";
  resetUI();
});

async function poll() {
  if (!currentJobId) return;
  let data;
  try { data = await (await fetch(`/status/${currentJobId}`)).json(); }
  catch { return; }

  if (data.status === "running") {
    setProgress(data.progress || 0, data.message || "Processing…");
  } else if (data.status === "done") {
    clearInterval(pollInterval);
    setProgress(100, "Done!");
    cancelBtn.style.display = "none";
    transcribeBtn.disabled = false;
    await showResult();
  } else if (data.status === "error") {
    clearInterval(pollInterval);
    showError("Transcription failed: " + (data.message || "unknown error"));
    resetUI();
  } else if (data.status === "cancelled") {
    clearInterval(pollInterval);
    resetUI();
  }
}

async function showResult() {
  const r = await fetch(`/result/${currentJobId}`);
  const d = await r.json();
  transcriptBox.value = d.transcript;
  resultSec.style.display = "block";
  progressSec.style.display = "none";
}

function setProgress(pct, msg) {
  progressLabel.textContent = msg;
  progressPct.textContent   = pct + "%";
  progressFill.style.width  = pct + "%";
}

function showError(msg) {
  errorMsg.textContent   = msg;
  errorCard.style.display = "block";
}
function hideError() { errorCard.style.display = "none"; }

function resetUI() {
  transcribeBtn.disabled  = (selectedFile === null);
  cancelBtn.style.display = "none";
  clearInterval(pollInterval);
}

// Copy
copyBtn.addEventListener("click", () => {
  navigator.clipboard.writeText(transcriptBox.value).then(() => {
    copyBtn.textContent = "Copied!";
    setTimeout(() => { copyBtn.textContent = "Copy all"; }, 2000);
  });
});

// Download
downloadBtn.addEventListener("click", () => {
  if (currentJobId) window.location.href = `/download/${currentJobId}`;
});

// ── Save to Library ──
const savePanel       = document.getElementById("save-panel");
const projectSelect   = document.getElementById("project-select");
const newProjectInput = document.getElementById("new-project-input");
const confirmSaveBtn  = document.getElementById("confirm-save-btn");
const cancelSaveBtn   = document.getElementById("cancel-save-btn");
const saveSuccess     = document.getElementById("save-success");

saveLibBtn.addEventListener("click", async () => {
  saveSuccess.style.display = "none";
  await populateProjectSelect();
  savePanel.style.display = "block";
});
cancelSaveBtn.addEventListener("click", () => { savePanel.style.display = "none"; });

projectSelect.addEventListener("change", () => {
  newProjectInput.style.display = projectSelect.value === "__new__" ? "block" : "none";
});

confirmSaveBtn.addEventListener("click", async () => {
  let projectId = projectSelect.value === "" ? null : projectSelect.value;

  if (projectSelect.value === "__new__") {
    const name = newProjectInput.value.trim();
    if (!name) { newProjectInput.focus(); return; }
    const r = await fetch("/library/projects", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    const proj = await r.json();
    projectId = proj.id;
    newProjectInput.value = "";
    newProjectInput.style.display = "none";
  }

  await fetch("/library/transcripts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ job_id: currentJobId, project_id: projectId }),
  });

  savePanel.style.display = "none";
  saveSuccess.style.display = "block";
  setTimeout(() => { saveSuccess.style.display = "none"; }, 3000);
});

async function populateProjectSelect() {
  const data = await fetch("/library").then(r => r.json());
  const projects = Object.values(data.projects || {});
  projectSelect.innerHTML = '<option value="">No project (Uncategorized)</option>';
  projects.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id; opt.textContent = p.name;
    projectSelect.appendChild(opt);
  });
  const newOpt = document.createElement("option");
  newOpt.value = "__new__"; newOpt.textContent = "+ Create new project…";
  projectSelect.appendChild(newOpt);
  newProjectInput.style.display = "none";
}


// ═══════════════════════════════════════════════════════
// LIBRARY VIEW
// ═══════════════════════════════════════════════════════
let libData        = { projects: {}, transcripts: {} };
let selectedProjId = null;   // null = show Uncategorized

async function loadLibrary() {
  libData = await fetch("/library").then(r => r.json());
  renderProjects();
  renderTranscripts(selectedProjId);
}

function renderProjects() {
  const list = document.getElementById("project-list");
  list.innerHTML = "";

  // Uncategorized (always first)
  list.appendChild(makeProjectRow(null, "📋", "Uncategorized", false));

  Object.values(libData.projects).forEach(p => {
    list.appendChild(makeProjectRow(p.id, "📁", p.name, true));
  });
}

function makeProjectRow(pid, icon, name, editable) {
  const row = document.createElement("div");
  row.className = "project-item" + (selectedProjId === pid ? " selected" : "");
  row.dataset.pid = pid ?? "";

  const iconEl = document.createElement("span");
  iconEl.className = "proj-icon"; iconEl.textContent = icon;

  const nameEl = document.createElement("span");
  nameEl.className = "proj-name"; nameEl.textContent = name;

  const actions = document.createElement("div");
  actions.className = "proj-actions";

  row.appendChild(iconEl);
  row.appendChild(nameEl);
  row.appendChild(actions);

  if (editable) {
    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn"; editBtn.title = "Rename"; editBtn.textContent = "✏️";
    editBtn.addEventListener("click", e => {
      e.stopPropagation();
      startRenameProject(row, nameEl, pid, name);
    });

    const delBtn = document.createElement("button");
    delBtn.className = "icon-btn danger"; delBtn.title = "Delete project"; delBtn.textContent = "🗑";
    delBtn.addEventListener("click", async e => {
      e.stopPropagation();
      if (!confirm(`Delete project "${name}" and all its transcripts? This cannot be undone.`)) return;
      await fetch(`/library/projects/${pid}`, { method: "DELETE" });
      if (selectedProjId === pid) selectedProjId = null;
      await loadLibrary();
    });

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
  }

  row.addEventListener("click", () => {
    selectedProjId = pid;
    renderProjects();
    renderTranscripts(pid);
  });

  return row;
}

function startRenameProject(row, nameEl, pid, oldName) {
  const input = document.createElement("input");
  input.className = "proj-name-input";
  input.value = oldName;
  row.replaceChild(input, nameEl);
  input.focus(); input.select();

  async function commit() {
    const val = input.value.trim();
    if (val && val !== oldName) {
      await fetch(`/library/projects/${pid}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: val }),
      });
    }
    await loadLibrary();
  }
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter")  { input.blur(); }
    if (e.key === "Escape") { input.value = oldName; input.blur(); }
  });
}

function renderTranscripts(pid) {
  const panel = document.getElementById("transcript-list");
  const title = document.getElementById("lib-panel-title");

  if (pid === null) {
    title.textContent = "Uncategorized";
  } else {
    const p = libData.projects[pid];
    title.textContent = p ? p.name : "Project";
  }

  const transcripts = Object.values(libData.transcripts)
    .filter(t => (t.project_id ?? null) === pid)
    .sort((a, b) => b.created_at.localeCompare(a.created_at));

  if (transcripts.length === 0) {
    panel.innerHTML = `<div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <p>No transcripts here yet.</p>
    </div>`;
    return;
  }

  panel.innerHTML = "";
  transcripts.forEach(t => panel.appendChild(makeTranscriptCard(t)));
}

function makeTranscriptCard(t) {
  const card = document.createElement("div");
  card.className = "transcript-card";

  const date = new Date(t.created_at).toLocaleDateString("en-GB", {
    day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
  });
  const preview = t.transcript.split("\n")[0] || "";

  card.innerHTML = `
    <div class="tc-header">
      <span class="tc-filename">${escHtml(t.filename)}</span>
      <span class="tc-date">${escHtml(date)}</span>
    </div>
    <div class="tc-preview">${escHtml(preview)}</div>
    <div class="tc-actions"></div>
  `;

  const actions = card.querySelector(".tc-actions");

  const dlBtn = document.createElement("button");
  dlBtn.className = "btn btn-outline btn-sm"; dlBtn.textContent = "Download .txt";
  dlBtn.addEventListener("click", () => { window.location.href = `/library/transcripts/${t.id}/download`; });

  const delBtn = document.createElement("button");
  delBtn.className = "btn btn-sm";
  delBtn.style.cssText = "background:rgba(255,116,68,0.12);color:var(--accent);";
  delBtn.textContent = "Delete";
  delBtn.addEventListener("click", async () => {
    if (!confirm("Delete this transcript? This cannot be undone.")) return;
    await fetch(`/library/transcripts/${t.id}`, { method: "DELETE" });
    await loadLibrary();
  });

  actions.appendChild(dlBtn);
  actions.appendChild(delBtn);
  return card;
}

// New project from library sidebar
document.getElementById("new-project-btn").addEventListener("click", async () => {
  const name = prompt("New project name:");
  if (!name || !name.trim()) return;
  const r = await fetch("/library/projects", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name.trim() }),
  });
  const proj = await r.json();
  selectedProjId = proj.id;
  await loadLibrary();
});

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
